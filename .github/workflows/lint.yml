name: Lint

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"
        
    - name: Install tools
      run: pip install ruff
      
    - name: Check code
      run: ruff check llmbrain tests
      
    - name: Check formatting
      run: ruff format --check llmbrain tests
