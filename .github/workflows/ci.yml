name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev,web]"
        
    - name: Compile python files
      run: python -m compileall llmbrain tests
        
    - name: Run tests
      run: pytest
      
    - name: Test CLI help
      run: llmbrain --help
      
    - name: Test version
      run: llmbrain version
      
    - name: Test Mock Build
      run: llmbrain build examples/sample-project --mode mock
      
    - name: Test CI mode
      run: llmbrain ci examples/sample-project --fail-on high
