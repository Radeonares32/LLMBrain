name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    
    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

    steps:
    - uses: actions/checkout@v6
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev,web]"
        
    - name: Compile python files
      run: python -m compileall llmbrain tests
        
    - name: Run tests
      run: pytest
      
    - name: Test CLI help
      run: llmbrain --help
      
    - name: Test version
      run: llmbrain version
      
    - name: Test scan
      run: llmbrain scan examples/sample-project

    - name: Test DeepSeek build
      if: env.DEEPSEEK_API_KEY != ''
      run: llmbrain build examples/sample-project --provider deepseek
      
    - name: Test CI mode
      if: env.DEEPSEEK_API_KEY != ''
      run: llmbrain ci examples/sample-project --fail-on high
